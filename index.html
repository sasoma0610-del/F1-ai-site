<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F1 AI予測サイト</title>

  <link rel="stylesheet" href="./style.css" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <main class="container">
    <h1>🏎️ F1 AI予測サイト</h1>

    <section class="card">
      <h2>🔮 次レース予測</h2>
      <div id="predictions">読み込み中...</div>
    </section>

    <section class="card">
      <h2>👤 ドライバー一覧</h2>
      <div id="drivers">読み込み中...</div>
    </section>

    <section class="card" id="detailCard" style="display: none;">
      <h2 id="driverTitle">📊 ドライバー分析</h2>
      <p id="driverInfo"></p>
      <canvas id="driverChart"></canvas>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
